name: Verify publisher GitHub App

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify publisher App token
    runs-on: ubuntu-22.04
    environment: release
    steps:
      - name: Create publisher GitHub App token
        id: versions-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.SOVEREIGN_PUBLISHER_CLIENT_ID }}
          private-key: ${{ secrets.SOVEREIGN_PUBLISHER_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: sovereign-vscode-build
          permission-contents: write

      - name: Verify installation scope
        env:
          GH_TOKEN: ${{ steps.versions-token.outputs.token }}
          APP_SLUG: ${{ steps.versions-token.outputs.app-slug }}
        run: |
          set -euo pipefail
          echo "app-slug=${APP_SLUG}"
          gh api /installation/repositories --jq '.repositories[] | select(.full_name == "DanielFabian/sovereign-vscode-build") | {full_name, permissions}'

      - name: Verify build repo contents write
        env:
          GH_TOKEN: ${{ steps.versions-token.outputs.token }}
        run: |
          set -euo pipefail
          tmpdir=$(mktemp -d)
          git clone "https://x-access-token:${GH_TOKEN}@github.com/DanielFabian/sovereign-vscode-build.git" "$tmpdir/build"
          cd "$tmpdir/build"
          git config user.name "sovereign-vscode-publisher[bot]"
          git config user.email "282203273+sovereign-vscode-publisher[bot]@users.noreply.github.com"
          mkdir -p .github
          date -u +'%Y-%m-%dT%H:%M:%SZ' > .github/publisher-app-verified.txt
          git add .github/publisher-app-verified.txt
          if git diff --cached --quiet; then
            echo "No write probe change needed."
          else
            git commit -m "chore: verify publisher app write access"
            git push origin HEAD:main
          fi
