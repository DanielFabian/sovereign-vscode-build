name: Linux x64 build

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Optional Sovereign release version override, e.g. 1.118.10101 for upstream 1.118.1 build 01
        required: false
        type: string
      publish_release:
        description: Publish assets to GitHub Releases and update release metadata
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: linux-x64-${{ github.ref }}
  cancel-in-progress: false

env:
  APP_NAME: SovereignCode
  APP_DISPLAY_NAME: Sovereign Code
  ASSETS_REPOSITORY: DanielFabian/sovereign-vscode-build
  BINARY_NAME: scode
  DISABLE_UPDATE: no
  GH_REPO_PATH: DanielFabian/sovereign-vscode-build
  GLOBAL_DIRNAME: scode
  ORG_NAME: DanielFabian
  OS_NAME: linux
  VERSIONS_REPOSITORY: DanielFabian/sovereign-vscode-build
  VERSIONS_BRANCH: main
  VSCODE_QUALITY: stable
  VSCODE_ARCH: x64
  SHOULD_BUILD: yes
  SHOULD_BUILD_REH: no
  SHOULD_BUILD_REH_WEB: no
  SHOULD_BUILD_APPIMAGE: no
  CI_BUILD: yes
  npm_config_arch: x64
  RELEASE_VERSION: ${{ inputs.release_version }}

jobs:
  compile:
    name: Compile VS Code prepack
    runs-on: ubuntu-22.04
    container:
      image: vscodium/vscodium-linux-build-agent:focal-x64
    outputs:
      release_version: ${{ steps.version.outputs.release_version }}
      build_sourceversion: ${{ steps.version.outputs.build_sourceversion }}
      ms_tag: ${{ steps.version.outputs.ms_tag }}
      ms_commit: ${{ steps.version.outputs.ms_commit }}
    steps:
      - name: Checkout build repo
        uses: actions/checkout@v6

      - name: Resolve upstream VS Code version
        id: version
        shell: bash
        run: |
          set -exo pipefail
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          . ./get_repo.sh
          . ./version.sh
          {
            echo "release_version=${RELEASE_VERSION}"
            echo "build_sourceversion=${BUILD_SOURCEVERSION}"
            echo "ms_tag=${MS_TAG}"
            echo "ms_commit=${MS_COMMIT}"
          } >> "$GITHUB_OUTPUT"

      - name: Compile vscode-min-prepack
        shell: bash
        run: |
          set -exo pipefail
          ./build.sh

      - name: Create prepack transfer artifact
        shell: bash
        run: |
          set -exo pipefail
          find vscode -type f \
            -not -path "*/node_modules/*" \
            -not -path "vscode/.build/node/*" \
            -not -path "vscode/.git/*" \
            > vscode.txt
          find vscode/.build/extensions -type d -name node_modules -print >> vscode.txt
          echo "vscode/.git" >> vscode.txt
          tar -czf vscode.tar.gz -T vscode.txt
          ls -lh vscode.tar.gz

      - name: Upload prepack transfer artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-prepack-linux-x64
          path: vscode.tar.gz
          retention-days: 1
          if-no-files-found: error

  package:
    name: Package Linux x64 assets
    needs: compile
    runs-on: ubuntu-22.04
    container:
      image: vscodium/vscodium-linux-build-agent:focal-x64
    env:
      RELEASE_VERSION: ${{ needs.compile.outputs.release_version }}
      BUILD_SOURCEVERSION: ${{ needs.compile.outputs.build_sourceversion }}
      MS_TAG: ${{ needs.compile.outputs.ms_tag }}
      MS_COMMIT: ${{ needs.compile.outputs.ms_commit }}
    steps:
      - name: Checkout build repo
        uses: actions/checkout@v6

      - name: Download prepack transfer artifact
        uses: actions/download-artifact@v5
        with:
          name: vscode-prepack-linux-x64
          path: .

      - name: Install Rust for CLI/tunnel build
        shell: bash
        run: |
          set -exo pipefail
          curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          . "$HOME/.cargo/env"
          rustup --version
          cargo --version

      - name: Package tar/deb/rpm/CLI assets
        shell: bash
        run: |
          set -exo pipefail
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          ls -lh vscode.tar.gz
          ./build/linux/deps.sh
          ./build/linux/package_bin.sh
          SHOULD_BUILD_APPIMAGE=no SHOULD_BUILD_REH=no SHOULD_BUILD_REH_WEB=no ./prepare_assets.sh
          ls -lh assets

      - name: Upload Linux x64 assets
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-assets
          path: assets/*
          retention-days: 1
          if-no-files-found: error

  publish:
    name: Publish Linux x64 release
    if: ${{ inputs.publish_release }}
    needs: [compile, package]
    runs-on: ubuntu-22.04
    environment: release
    permissions:
      contents: write
    env:
      RELEASE_VERSION: ${{ needs.compile.outputs.release_version }}
      BUILD_SOURCEVERSION: ${{ needs.compile.outputs.build_sourceversion }}
      MS_TAG: ${{ needs.compile.outputs.ms_tag }}
      MS_COMMIT: ${{ needs.compile.outputs.ms_commit }}
    steps:
      - name: Checkout build repo
        uses: actions/checkout@v6

      - name: Download Linux x64 assets
        uses: actions/download-artifact@v5
        with:
          name: linux-x64-assets
          path: assets

      - name: Install GitHub CLI for publishing
        shell: bash
        run: |
          set -exo pipefail
          ./build/linux/install_gh.sh

      - name: Publish GitHub release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: |
          set -exo pipefail
          ./release.sh

      - name: Create publisher GitHub App token
        id: versions-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.SOVEREIGN_PUBLISHER_CLIENT_ID }}
          private-key: ${{ secrets.SOVEREIGN_PUBLISHER_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: sovereign-vscode-build
          permission-contents: write

      - name: Resolve GitHub App bot user
        id: app-user
        shell: bash
        env:
          GH_TOKEN: ${{ steps.versions-token.outputs.token }}
          APP_SLUG: ${{ steps.versions-token.outputs.app-slug }}
        run: |
          set -euo pipefail
          user_id=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)
          echo "user_id=${user_id}" >> "$GITHUB_OUTPUT"

      - name: Update release metadata
        shell: bash
        env:
          GH_TOKEN: ${{ steps.versions-token.outputs.token }}
          GITHUB_TOKEN: ${{ steps.versions-token.outputs.token }}
          GIT_AUTH_USERNAME: x-access-token
          GIT_COMMIT_USERNAME: ${{ steps.versions-token.outputs.app-slug }}[bot]
          GIT_COMMIT_EMAIL: ${{ steps.app-user.outputs.user_id }}+${{ steps.versions-token.outputs.app-slug }}[bot]@users.noreply.github.com
        run: |
          set -exo pipefail
          ./update_version.sh
