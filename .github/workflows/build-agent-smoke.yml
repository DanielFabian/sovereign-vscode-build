name: Build agent smoke

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-agent-smoke.yml

permissions:
  contents: read

jobs:
  linux-build-agent-container:
    name: VSCodium Linux build-agent container
    runs-on: ubuntu-22.04
    container:
      image: vscodium/vscodium-linux-build-agent:focal-x64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show container and workspace facts
        shell: bash
        run: |
          set -euxo pipefail
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          echo "runner.os=$RUNNER_OS"
          echo "runner.arch=$RUNNER_ARCH"
          echo "workspace=$GITHUB_WORKSPACE"
          pwd
          id
          uname -a
          cat /etc/os-release
          nproc
          free -h
          df -h
          git status --short --branch

      - name: Show build tool versions
        shell: bash
        run: |
          set -euxo pipefail
          for tool in node npm git gcc g++ python python3 jq rpm dpkg-deb fakeroot curl docker rustup cargo; do
            printf '%s: ' "$tool"
            command -v "$tool" || true
          done
          node --version
          npm --version
          gcc --version | head -1
          python --version
          python3 --version
          jq --version
          docker --version || true
          rustup --version || true
          cargo --version || true
